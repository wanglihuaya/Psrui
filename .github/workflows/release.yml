name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifact_name: macos
          - os: ubuntu-latest
            target: linux
            artifact_name: linux
          - os: windows-latest
            target: win
            artifact_name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute app version
        id: app-version
        shell: bash
        run: |
          app_version="${GITHUB_REF_NAME#v}"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

      - name: Rewrite package version for packaged app
        run: npm version --no-git-tag-version "${{ steps.app-version.outputs.app_version }}"

      - name: Build Electron app
        run: npm run build

      - name: Package Electron app
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
            dist/latest*.yaml

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          name="${GITHUB_REF_NAME}"
          app_version="${GITHUB_REF_NAME#v}"
          body="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          if [[ -z "${body//[[:space:]]/}" ]]; then
            body="Stable release ${GITHUB_REF_NAME}."
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${body}" > release-notes.txt

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          commit: ${{ github.sha }}
          bodyFile: release-notes.txt
          artifacts: release-assets/**/*
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          makeLatest: true
